seed: 1234
device: null

dataset:
  train:
    condition_dir: "D:/your_dataset/train/full"
    target_dirs:
      - "D:/your_dataset/train/left"
      - "D:/your_dataset/train/right"
    image_size: [256, 256]
    normalize: "range_m11"
  val:
    condition_dir: "D:/your_dataset/val/full"
    target_dirs:
      - "D:/your_dataset/val/left"
      - "D:/your_dataset/val/right"
    image_size: [256, 256]
    normalize: "range_m11"
  test:
    condition_dir: "D:/your_dataset/test/full"
    target_dirs:
      - "D:/your_dataset/test/left"
      - "D:/your_dataset/test/right"
    image_size: [256, 256]
    normalize: "range_m11"

model:
  image_size: 256
  inner_channel: 64
  channel_mults: [1, 2, 4, 8]
  attn_res: [16]
  res_blocks: 2
  dropout: 0.1

diffusion:
  sample_steps: 100
  beta_schedule:
    schedule: "linear"
    n_timestep: 100
    linear_start: 0.0001
    linear_end: 0.02

train:
  epochs: 100
  batch_size: 4
  val_batch_size: 2
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0
  val_every: 1

logging:
  use_swanlab: true
  project: "palette_decoupling_cbct"
  experiment_name: "cbct_full_to_left_right"

output:
  root: "D:/vscode_workplace/codeplace/palette/outputs/palette_decoupling_cbct"
